name: CI Pipeline

on:
    push:
        branches: [master, main]
    pull_request:
        branches: [master, main]

jobs:
    build:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: TourGuide

        steps:
            # 1. Checkout du code source
            - name: Checkout repository
              uses: actions/checkout@v4

            # 2. Configuration de Java 17
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: '17'
                  distribution: 'temurin'
                  cache: maven
                  cache-dependency-path: TourGuide/pom.xml

            # 3. Installation des dépendances locales (JARs)
            - name: Install local dependencies
              run: |
                  mvn install:install-file -Dfile=libs/gpsUtil.jar -DgroupId=gpsUtil -DartifactId=gpsUtil -Dversion=1.0.0 -Dpackaging=jar
                  mvn install:install-file -Dfile=libs/RewardCentral.jar -DgroupId=rewardCentral -DartifactId=rewardCentral -Dversion=1.0.0 -Dpackaging=jar
                  mvn install:install-file -Dfile=libs/TripPricer.jar -DgroupId=tripPricer -DartifactId=tripPricer -Dversion=1.0.0 -Dpackaging=jar

            # 4. ÉTAPE 1 - Compilation
            - name: Compile
              run: mvn compile

            # 5. ÉTAPE 2 - Tests
            - name: Run tests
              run: mvn test

            # 6. ÉTAPE 3 - Build de l'artefact
            - name: Build artifact
              run: mvn package -DskipTests

            # 7. Upload de l'artefact généré
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: tourguide-jar
                  path: TourGuide/target/*.jar
                  retention-days: 7
